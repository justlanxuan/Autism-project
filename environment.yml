# Autism Project - Environment Configuration
# Usage: conda env create -f environment.yml
#        conda activate autism_reid

name: test_reid
channels:
  - pytorch
  - conda-forge

dependencies:
  # Python & PyTorch
  - python=3.10
  - pytorch=2.1.0
  - torchvision=0.16.0
  - pytorch-cuda=11.8
  
  # Data Processing
  - numpy=1.26
  - scipy=1.11
  - pandas
  - pyyaml
  - pillow
  - opencv
  
  # Visualization & Tools
  - matplotlib
  - tqdm
  - cython
  - imageio
  - pip
  
  # Pip dependencies
  - pip:
    # ByteTrack & AlphaPose dependencies
    - thop
    - loguru
    - tabulate
    - lap
    - cython-bbox
    - easydict
    - halpecocotools
    - munkres
    - natsort
    - pycocotools
    - yapf
    
    # ML & Training
    - tensorboard
    - timm
    - einops
    - scikit-learn
    - scikit-image
