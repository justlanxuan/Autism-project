# TotalCapture full training using Vicon GT
# S1-S5, 50 epochs

project: totalcapture

preprocess:
  dataset: totalcapture
  raw_root: /data/fzliang/totalcapture
  camera: cam1
  output: ./data/interim/video_manifest.csv

slice:
  root: /data/fzliang/totalcapture
  window_len: 24
  stride: 16
  sensor_order: [L_LowLeg, R_LowLeg, L_LowArm, R_LowArm]
  train_subjects: S1,S2,S3
  val_subjects: S4
  test_subjects: S5
  max_sequences: 0

train:
  model:
    motionbert_root: /home/fzliang/MotionBERT
    motionbert_config: configs/pose3d/MB_ft_h36m_global_lite.yaml
    motionbert_ckpt: checkpoint/pretrain/MB_lite_models.bin
    imu_ckpt: /home/fzliang/despite/totalcapture/checkpoints/si_totalcapture_best.pth
  epochs: 50
  batch_size: 64
  num_workers: 8
  compute_imu_stats: true
  imu_sensor: R_LowArm
  repeat_single_sensor: 4

test:
  batch_size: 64
  grouped_test:
    enabled: true
    group_sizes: "2,4,6,8,16"
    num_trials: 50
    chunk_windows: 30
    min_chunk_windows: 15
    seed: 42
