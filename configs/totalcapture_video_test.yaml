# TotalCapture video workflow quick test
# Small sample (1 video, S1 only, 2 epochs)

project: totalcapture_video_test

preprocess:
  dataset: totalcapture
  raw_root: /data/fzliang/totalcapture
  camera: cam1
  output: ./data/interim/video_manifest.csv

extract:
  detector: bytetrack
  tracker: bytetrack
  pose_estimator: alphapose
  manifest_csv: ./data/interim/video_manifest.csv
  limit: 1
  skip_existing: true
  gpu: 0
  merge_tracklets:
    enabled: false
    max_gap: 10000000
    score_thresh: 2.2
    max_norm_dist: 2.8
    max_size_diff: 1.8
    fill_gaps: false
    known_num_people: 1

slice:
  root: /data/fzliang/totalcapture
  window_len: 24
  stride: 16
  sensor_order: [L_LowLeg, R_LowLeg, L_LowArm, R_LowArm]
  train_subjects: S1
  val_subjects: S1
  test_subjects: S1
  max_sequences: 1

train:
  model:
    motionbert_root: /home/fzliang/origin/MotionBERT
    motionbert_config: configs/pose3d/MB_ft_h36m_global_lite.yaml
    motionbert_ckpt: checkpoint/pretrain/MB_lite_models.bin
    imu_ckpt: /home/fzliang/despite/pretrained_models/v2/SIE_v2.pth
  epochs: 2
  batch_size: 32
  num_workers: 4
  compute_imu_stats: true
  imu_sensor: R_LowArm
  repeat_single_sensor: 4

test:
  batch_size: 32
  grouped_test:
    enabled: true
    group_sizes: "2,4,6,8,16"
    num_trials: 50
    chunk_windows: 30
    min_chunk_windows: 15
    seed: 42