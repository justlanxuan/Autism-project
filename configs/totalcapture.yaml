# TotalCapture 完整版配置
# 使用 Vicon 3D 骨架（高精度 Ground Truth）

dataset: totalcapture

preprocess:
  root: /data/fzliang/totalcapture
  out_dir: ./data/processed/totalcapture
  window_len: 24
  stride: 16
  sensor_order: [L_LowLeg, R_LowLeg, L_LowArm, R_LowArm]
  train_subjects: S1,S2,S3
  val_subjects: S4
  test_subjects: S5
  max_sequences: 0  # 0 = 使用所有序列
  skeleton_source: vicon

model:
  motionbert_root: /home/fzliang/origin/MotionBERT
  motionbert_config: configs/pose3d/MB_ft_h36m_global_lite.yaml
  motionbert_ckpt: checkpoint/pretrain/MB_lite_models.bin
  imu_ckpt: /home/fzliang/origin/despite/totalcapture/checkpoints/si_totalcapture_best.pth

paths:
  data_root: ./data/processed/totalcapture
  train_csv: ./data/processed/totalcapture/windows_train.csv
  val_csv: ./data/processed/totalcapture/windows_val.csv
  test_csv: ./data/processed/totalcapture/windows_test.csv

output:
  output_root: ./artifacts
  save_dir: .
  run_name: totalcapture_full

train:
  epochs: 50
  batch_size: 64
  num_workers: 8
  compute_imu_stats: true
  imu_sensor: R_LowArm
  repeat_single_sensor: 4

test:
  batch_size: 64

grouped_test:
  enabled: true
  group_sizes: "2,4,6,8,16"
  num_trials: 50
  chunk_windows: 30
  min_chunk_windows: 15
  seed: 42
