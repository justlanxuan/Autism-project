# TotalCapture video workflow full training
# All subjects (S1-S5), all videos, 50 epochs

project: totalcapture_video

preprocess:
  dataset: totalcapture
  raw_root: /data/fzliang/totalcapture
  camera: cam1
  output: ./data/interim/video_manifest.csv

extract:
  tracker: bytetrack
  pose_estimator: alphapose
  manifest_csv: ./data/interim/video_manifest.csv
  limit: 0
  results_root: ./data/interim/totalcapture_video_skeletons
  skip_existing: true
  gpu: 0
  tracker_root: ./third-party/ByteTrack
  tracker_ckpt: /home/fzliang/ByteTrack/pretrained/bytetrack_x_mot17.pth.tar
  pose_estimator_root: ./third-party/AlphaPose
  pose_estimator_cfg: configs/coco/resnet/256x192_res50_lr1e-3_1x.yaml
  pose_estimator_ckpt: ./third-party/AlphaPose/pretrained_models/fast_res50_256x192.pth

slice:
  root: /data/fzliang/totalcapture
  skeleton_source: alphapose
  skeleton_root: ./data/interim/totalcapture_video_skeletons
  out_dir: ./data/processed/totalcapture_video
  window_len: 24
  stride: 16
  sensor_order: [L_LowLeg, R_LowLeg, L_LowArm, R_LowArm]
  train_subjects: S1,S2,S3
  val_subjects: S4
  test_subjects: S5
  max_sequences: 0

model:
  motionbert_root: /home/fzliang/origin/MotionBERT
  motionbert_config: configs/pose3d/MB_ft_h36m_global_lite.yaml
  motionbert_ckpt: checkpoint/pretrain/MB_lite_models.bin
  imu_ckpt: /home/fzliang/origin/despite/totalcapture/checkpoints/si_totalcapture_best.pth

paths:
  data_root: ./data/processed/totalcapture_video
  train_csv: ./data/processed/totalcapture_video/windows_train.csv
  val_csv: ./data/processed/totalcapture_video/windows_val.csv
  test_csv: ./data/processed/totalcapture_video/windows_test.csv

output:
  output_root: ./artifacts
  save_dir: .
  run_name: totalcapture_video

train:
  epochs: 50
  batch_size: 64
  num_workers: 8
  compute_imu_stats: true
  imu_sensor: R_LowArm
  repeat_single_sensor: 4

test:
  batch_size: 64

grouped_test:
  enabled: true
  group_sizes: "2,4,6,8,16"
  num_trials: 50
  chunk_windows: 30
  min_chunk_windows: 15
  seed: 42
