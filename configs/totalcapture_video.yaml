# TotalCapture 视频流程配置
# 从视频中提取骨架（AlphaPose + ByteTrack）

dataset: totalcapture_video

# 视频骨架提取配置
extract:
  # 输入视频清单
  manifest_csv: ./data/interim/video_manifest.csv
  
  # 限制处理视频数量（0 = 全部）
  limit: 1
  
  # 输出目录
  results_root: ./data/interim/video_skeleton_outputs
  
  # AlphaPose 配置
  alphapose_root: ./third-party/AlphaPose
  alphapose_cfg: configs/coco/resnet/256x192_res50_lr1e-3_1x.yaml
  alphapose_ckpt: ./third-party/AlphaPose/pretrained_models/fast_res50_256x192.pth
  
  # Tracking 配置
  tracking_mode: bytetrack_external
  pose_track_backend: bytetrack
  bytetrack_root: ./third-party/ByteTrack
  bytetrack_ckpt: /home/fzliang/ByteTrack/pretrained/bytetrack_x_mot17.pth.tar
  
  # 其他参数
  skip_existing: false
  gpu: 0

# 预处理配置（使用提取的骨架）
preprocess:
  root: /data/fzliang/totalcapture
  skeleton_source: alphapose
  skeleton_root: ./data/interim/video_skeleton_outputs
  out_dir: ./data/processed/totalcapture_video
  window_len: 24
  stride: 16
  sensor_order: [L_LowLeg, R_LowLeg, L_LowArm, R_LowArm]
  train_subjects: S1
  val_subjects: S1
  test_subjects: S1
  max_sequences: 1

model:
  motionbert_root: /home/fzliang/origin/MotionBERT
  motionbert_config: configs/pose3d/MB_ft_h36m_global_lite.yaml
  motionbert_ckpt: checkpoint/pretrain/MB_lite_models.bin
  imu_ckpt: ""

paths:
  data_root: ./data/processed/totalcapture_video
  train_csv: ./data/processed/totalcapture_video/windows_train.csv
  val_csv: ./data/processed/totalcapture_video/windows_train.csv
  test_csv: ./data/processed/totalcapture_video/windows_train.csv

output:
  output_root: ./artifacts
  save_dir: .
  run_name: totalcapture_video

train:
  epochs: 2
  batch_size: 32
  num_workers: 4
  compute_imu_stats: true
  imu_sensor: R_LowArm
  repeat_single_sensor: 4

test:
  batch_size: 32
