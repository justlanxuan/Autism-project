# Test refactored pipeline end-to-end (TotalCapture video workflow)

project: test_refact

preprocess:
  dataset: totalcapture
  raw_root: /data/fzliang/totalcapture
  camera: cam1
  output: ./data/interim/video_manifest.csv

extract:
  tracker: bytetrack
  pose_estimator: alphapose
  manifest_csv: ./data/interim/video_manifest.csv
  limit: 1
  results_root: ./data/interim/test_refact_skeletons
  skip_existing: true
  gpu: 0
  # Role-specific paths (generic names)
  tracker_root: ./third-party/ByteTrack
  tracker_ckpt: /home/fzliang/ByteTrack/pretrained/bytetrack_x_mot17.pth.tar
  pose_estimator_root: ./third-party/AlphaPose
  pose_estimator_cfg: configs/coco/resnet/256x192_res50_lr1e-3_1x.yaml
  pose_estimator_ckpt: pretrained_models/fast_res50_256x192.pth

slice:
  root: /data/fzliang/totalcapture
  skeleton_source: alphapose
  skeleton_root: ./data/interim/test_refact_skeletons
  out_dir: ./data/processed/test_refact
  window_len: 24
  stride: 16
  sensor_order: [L_LowLeg, R_LowLeg, L_LowArm, R_LowArm]
  train_subjects: S1
  val_subjects: S1
  test_subjects: S1
  max_sequences: 0

model:
  motionbert_root: /home/fzliang/origin/MotionBERT
  motionbert_config: configs/pose3d/MB_ft_h36m_global_lite.yaml
  motionbert_ckpt: checkpoint/pretrain/MB_lite_models.bin
  imu_ckpt: ""

paths:
  data_root: ./data/processed/test_refact
  train_csv: ./data/processed/test_refact/windows_train.csv
  val_csv: ./data/processed/test_refact/windows_train.csv
  test_csv: ./data/processed/test_refact/windows_train.csv

output:
  output_root: ./artifacts
  save_dir: .
  run_name: test_refact

train:
  epochs: 2
  batch_size: 32
  num_workers: 4
  compute_imu_stats: true
  imu_sensor: R_LowArm
  repeat_single_sensor: 4

test:
  batch_size: 32
